<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스네이크 게임</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" />
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        canvas {
            background: #eee;
            display: block;
            margin: 0 auto;
        }
        body {
            font-family: "Pretendard", sans-serif;
            text-align: center;
        }
        button {
            background-color: #0059ff; /* 기본 배경색 */
            color: white;              /* 글자색 */
            padding: 10px 20px;        /* 여백 */
            border: none;              /* 테두리 제거 */
            border-radius: 5px;        /* 모서리 둥글게 */
            cursor: pointer;           /* 마우스 커서 변경 */
            font-size: 16px;           /* 글자 크기 */
            font-family: "Pretendard", sans-serif; /* 버튼에도 폰트 적용 */
            transition: background-color 0.3s ease; /* hover 효과 */
            }
        button:hover {
                background-color: #000da0; /* 마우스 올렸을 때 색상 */
            }
            p {
                color: #0059ff;
            }
            h2 {
                color: #00ccff;
            }
    </style>
</head>
<body>
    <h2 style="text-align:center;">스네이크 게임</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>점수: <span id="score">0</span></p>
    <div style="display:flex; justify-content:center; gap:10px;">
        <a href="snakegame.html"><button>재시작</button></a>
        <a href="home.html"><button>홈으로 이동</button></a>
    </div>
    <script src="snake.js"></script>
        
</body>
</html>
