<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스네이크 게임</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" />
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        canvas {
            background: radial-gradient(circle at center, #0f0f0f, #1a1a1a); /* 어두운 배경 */
            display: block;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6), 0 0 40px rgba(0, 255, 255, 0.4);
        }
        body {

            background: url("background.jpg") no-repeat center center;
            background-size: cover; 
            color: #0ff; /* 네온 블루 글씨 */
        }
        h2 {
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #00f, 0 0 30px #0ff;
        }
        p {
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            text-align: center;
            font-size: 30px;
            margin-top: -100px;
        }
        button {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #0ff;
            box-shadow: 0 0 10px #0ff;
        }
        button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff, 0 0 40px #00f;
        }


        @keyframes glow {
            from { text-shadow: 0 0 5px #00ccff; }
            to { text-shadow: 0 0 20px #00ccff; }
        }
        .title {
            text-align: left;        /* 왼쪽 정렬 */
            margin-left: 20px;       /* 살짝 여백 */
            color: #00ccff;
            font-size: 28px;
            text-shadow: 0 0 10px #00ccff;
        }

        .score {
            text-align: center;      /* 중앙 정렬 */
            margin-top: -40px;       /* 제목과 겹치지 않게 위치 조정 */
            color: #0059ff;
            font-size: 20px;
            font-weight: bold;
        }
        .titles {
            display: flex;              /* 가로 배치 */
            gap: 3px;                  /* 버튼 사이 간격 */
                     /* 위쪽 여백 */
        }
        .buttons {
            display: flex;              /* 가로 배치 */
            justify-content: center;    /* 중앙 정렬 */
            gap: 20px;                 /* 버튼 사이 간격 */
            margin-top: 20px;          /* 위쪽 여백 */
        }
        .buttons a {
            text-decoration: none;     /* 링크 밑줄 제거 */
        }
        .score {
            text-align: center;      /* 중앙 정렬 */
            color: #0059ff;
            font-size: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="titles">
        <img src="logo.png" alt="게임 로고" style="display: block;" width="100">
        <h2 class="title">스네이크 게임</h2>
    </div>
    <p style="font-size: 20px;">Score</p>
    <div style="height: 10px;"></div> <!-- 제목과 점수 사이 간격 -->
    <p class = "score"><span id="score">0</span></p>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class = "buttons">
        <a href="snake.html"><button>재시작</button></a>
        <a href="index.html"><button>홈으로 이동</button></a>
    </div>
    <script src="snake.js"></script>
        
</body>
</html>
